name: calorie_ai_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  image_picker: ^1.1.0
  camera: ^0.10.5+9
  path_provider: ^2.1.2
  path: ^1.9.0
  provider: ^6.1.1
  flutter_spinkit: ^5.2.0
  google_generative_ai: ^0.4.6
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_native_splash:
  color: "#000000"
  image: "assets/image/app.png"
  android_12:
    image: "assets/image/app.png"
    color: "#000000"
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/app.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/image/app.png"
  ios_no_transparency: true

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/image/
