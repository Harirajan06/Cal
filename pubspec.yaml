name: calx
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  image_picker: ^1.1.0
  camera: ^0.10.5+9
  path_provider: ^2.1.2
  path: ^1.9.0
  provider: ^6.1.1
  flutter_spinkit: ^5.2.0
  google_generative_ai: ^0.4.7
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.1.0
  flutter_native_splash: ^2.4.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1
  record: ^6.2.0
  audioplayers: ^6.6.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  font_awesome_flutter: ^10.12.0
  home_widget: ^0.9.0
  file_picker: ^8.0.1
  archive: ^4.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_native_splash:
  color: "#000000"
  android_12:
    color: "#000000"
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/AppIconOptimized.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/image/AppIconOptimized.png"
  ios_no_transparency: true
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/svg/
    - assets/image/AppIconOptimized.png
 
